<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Livros</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <div class="login-box">

        <h1>📚 Cadastro de Livros</h1>

        <form id="formLivro">

            <input type="hidden" id="livroId">

            <label>Título</label>

            <input
                type="text"
                id="titulo"
                required
            >

            <label>Autor</label>

            <input
                type="text"
                id="autor"
                required
            >

            <label>Categoria</label>

            <input
                type="text"
                id="categoria"
                required
            >

            <button type="submit" id="btnSalvar">
                Cadastrar
            </button>

            <button type="button" id="btnCancelar" class="btn-cancelar" style="display:none;">
                Cancelar edição
            </button>

        </form>

        <br>

        <hr>

        <h2>Livros Cadastrados</h2>

        <div id="listaLivros">

        </div>

        <br>

        <button onclick="location.href='index.html'">
            Voltar
        </button>

    </div>

    <script src="js/livros.js"></script>

</body>

</html>
